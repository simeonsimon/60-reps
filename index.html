<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="description" content="60 Reps — a no-guilt 3D habit builder. Build the climb, one rep at a time." />
    <!-- Add-to-Home-Screen: launch full-screen, like a native app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="60 Reps" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a0b'/%3E%3Cpath d='M5 24 13 10l4 6 2.5-4L27 24Z' fill='none' stroke='%237aa2ff' stroke-width='2.2' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <!-- iOS home-screen icon + iPhone 15 Pro launch screen -->
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="./apple-splash-1179x2556.png"
    />
    <!-- Fonts are self-hosted (@fontsource, imported in main.jsx) so the app
         loads instantly and works fully offline. -->
    <title>60 Reps</title>
    <!-- Boot screen: inlined so it paints before any JS/CSS loads. The mountain
         draws itself in, then breathes gently until React mounts and App.jsx
         fades this out (see the boot-done class + removal effect). -->
    <style>
      #boot {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #0a0a0b;
        opacity: 1;
        transition: opacity 0.4s ease;
      }
      #boot.boot-done {
        opacity: 0;
        pointer-events: none;
      }
      #boot .boot-peak {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
        animation:
          boot-draw 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards,
          boot-breathe 2.6s ease-in-out 1.4s infinite;
      }
      #boot .boot-word {
        font: 800 15px/1 system-ui, -apple-system, 'Segoe UI', sans-serif;
        letter-spacing: 0.22em;
        color: #f5f5f7;
        opacity: 0;
        animation: boot-rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.75s forwards;
      }
      @keyframes boot-draw {
        to { stroke-dashoffset: 0; }
      }
      @keyframes boot-breathe {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
      }
      @keyframes boot-rise {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 0.92; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot .boot-peak { animation: none; stroke-dashoffset: 0; }
        #boot .boot-word { animation: none; opacity: 0.92; }
      }
    </style>
  </head>
  <body>
    <div id="boot" aria-hidden="true">
      <svg width="88" height="88" viewBox="0 0 32 32" fill="none">
        <path
          class="boot-peak"
          d="M5 24 13 10l4 6 2.5-4L27 24Z"
          pathLength="1"
          stroke="#7aa2ff"
          stroke-width="2.2"
          stroke-linejoin="round"
          stroke-linecap="round"
        />
      </svg>
      <div class="boot-word">60&nbsp;REPS</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
